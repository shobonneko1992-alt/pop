function buildChart(mode, level, targetBeats) {
  const baseBeatsLen = 20; // 1ループの基本拍数
  const fallbackTarget = 100; // 未指定時のデフォルト（100拍）
  const target = targetBeats || fallbackTarget;
  const numLanes = mode === "3K" ? 3 : 5;
  const charts = mode === "3K" ? CHARTS_3K : CHARTS_5K;
  const base = charts[level] ?? charts[1];
  const chart = [];
  let currentRep = 0;
  let prevLane = -1;
  
  while (currentRep * baseBeatsLen < target) {
    const shiftAmt = Math.floor(Math.random() * numLanes);

    base.forEach(([beat, originalLane]) => {
      const actualBeat = beat + currentRep * baseBeatsLen;
      if (actualBeat <= target) {
        let actualLane = originalLane;
        
        // 最初のループ以降はレーン配置にランダム性を持たせる
        if (currentRep > 0) {
          const rand = Math.random();
          if (rand < 0.25 && prevLane !== -1) {
            // 25%の確率で前のノーツと同じレーン（同じ色の連続）
            actualLane = prevLane;
          } else if (rand < 0.6) {
            // 35%の確率で完全ランダム
            actualLane = Math.floor(Math.random() * numLanes);
          } else {
            // 40%の確率でパターンをベースに全体をシフトさせたもの
            actualLane = (originalLane + shiftAmt) % numLanes;
          }
        }
        
        chart.push({beat: actualBeat, lane: actualLane, id:`${currentRep}-${beat}-${Math.random()}`});
        prevLane = actualLane;
      }
    });
    currentRep++;
  }
  return chart.sort((a, b) => a.beat - b.beat);
}

async function analyzeBPM(urlOrFile) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    let arrayBuffer;
    if (typeof urlOrFile === "string") {
      const response = await fetch(urlOrFile);
      arrayBuffer = await response.arrayBuffer();
    } else if (urlOrFile instanceof File || urlOrFile instanceof Blob) {
      arrayBuffer = await urlOrFile.arrayBuffer();
    } else {
      return 130;
    }
    const audioBuffer = await ctx.decodeAudioData(arrayBuffer);
    const sampleRate = audioBuffer.sampleRate;
    const data = audioBuffer.getChannelData(0);
    
    // 最初の40秒に限定して解析速度とBPM判定の精度を向上
    const maxSamples = Math.min(data.length, sampleRate * 40);
    const step = 4;
    
    // 音量に応じた動的なしきい値設定 (全体の最大音量の70%)
    let maxVal = 0;
    for (let i = 0; i < maxSamples; i += 100) {
      if (Math.abs(data[i]) > maxVal) maxVal = Math.abs(data[i]);
    }
    let threshold = maxVal * 0.7;
    if (threshold < 0.15) threshold = 0.2; // 極端に静かな曲対策
    
    let peaks = [];
    for (let i = 0; i < maxSamples; i += step) {
      if (Math.abs(data[i]) > threshold) {
        peaks.push(i);
        // 音ゲーに多いアップテンポ（BPM 240相当）を考慮して最小間隔を0.25秒に制限
        i += sampleRate * 0.25; 
      }
    }
    
    // ピークが少なすぎる場合は閾値を下げて再試行
    if (peaks.length < 12) {
      threshold = maxVal * 0.45;
      peaks = [];
      for (let i = 0; i < maxSamples; i += step) {
        if (Math.abs(data[i]) > threshold) {
          peaks.push(i);
          i += sampleRate * 0.25;
        }
      }
    }
    
    if (peaks.length < 2) return 130;
    
    // ピーク間の間隔を集計
    let intervals = [];
    for (let i = 1; i < peaks.length; i++) {
      intervals.push(peaks[i] - peaks[i - 1]);
    }
    
    // 各間隔をBPMに変換し、テンポの最頻値を算出する
    const bpms = intervals.map(interval => {
      const duration = interval / sampleRate;
      let b = 60 / duration;
      if (b <= 0) return 0;
      // 95 〜 190 の基本テンポ範囲に一旦マッピング
      while (b < 95) b *= 2;
      while (b > 190) b /= 2;
      return Math.round(b);
    }).filter(b => b > 0);
    
    if (bpms.length === 0) return 130;
    
    // 最頻値 (Mode) の集計
    const counts = {};
    let maxCount = 0;
    let modeBpm = 130;
    bpms.forEach(b => {
      const rounded = Math.round(b);
      counts[rounded] = (counts[rounded] || 0) + 1;
      if (counts[rounded] > maxCount) {
        maxCount = counts[rounded];
        modeBpm = rounded;
      }
    });
    
    // アップテンポな曲 (最大240) までを適正カバー
    let finalBpm = modeBpm;
    if (finalBpm < 90) finalBpm *= 2;
    if (finalBpm > 240) finalBpm /= 2;
    
    return Math.round(finalBpm);
  } catch (e) {
    console.error("BPM analysis failed:", e);
    return 130;
  }
}

let globalAudioCtx = null;
function playBeep(freq) {
  try {
    if (!globalAudioCtx) {
      globalAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (globalAudioCtx.state === "suspended") {
      globalAudioCtx.resume();
    }
    const ctx = globalAudioCtx;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = "sine";
    o.frequency.setValueAtTime(freq || 440, ctx.currentTime);
    g.gain.setValueAtTime(0.08, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
    o.start();
    o.stop(ctx.currentTime + 0.08);
  } catch (e) {
    console.error("playBeep error:", e);
  }
}

// ================================================================
// DB Utility (IndexedDB for storing custom audio files)
// ================================================================
const DB_NAME = "PopnDB";
const STORE_NAME = "audioFiles";

function initDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => { e.target.result.createObjectStore(STORE_NAME); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function saveAudioFile(name, arrayBuffer) {
  return initDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readwrite");
    tx.objectStore(STORE_NAME).put(arrayBuffer, name);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  }));
}

function getAudioFile(name) {
  return initDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readonly");
    const req = tx.objectStore(STORE_NAME).get(name);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(tx.error);
  }));
}

function getAudioFileList() {
  return initDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readonly");
    const req = tx.objectStore(STORE_NAME).getAllKeys();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(tx.error);
  }));
}

const getAudioSrc = async (fileName) => {
  if (!fileName) return { url: "", isBlob: false };
  try {
    const buf = await getAudioFile(fileName);
    if (buf) {
      return { url: URL.createObjectURL(new Blob([buf])), isBlob: true };
    }
  } catch(e) {}
  return { url: "フリーBGM/" + fileName, isBlob: false };
};

  // キャラクター画像のスプライト（左上、右上、左下、右下）
  const [charSprites, setCharSprites] = useState([]);

  useEffect(() => {
    if (typeof CHAR_B64 === "undefined") {
      console.error("char.js is not loaded");
      return;
    }
    const loadAndProcess = (src, index) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        const w = img.width;
        const h = img.height;
        canvas.width = w; canvas.height = h;
        ctx.drawImage(img, 0, 0);
        
        const imgData = ctx.getImageData(0, 0, w, h);
        const data = imgData.data;

        const isBg = (idx) => {
          const r = data[idx], g = data[idx+1], b = data[idx+2];
          const max = Math.max(r, g, b), min = Math.min(r, g, b);
          return (r > 245 && g > 245 && b > 245) || (r > 210 && g > 210 && b > 210 && (max - min) < 20);
        };

        const stack = [];
        const visited = new Uint8Array(w * h);
        for (let x = 0; x < w; x++) { stack.push([x, 0]); stack.push([x, h - 1]); }
        for (let y = 0; y < h; y++) { stack.push([0, y]); stack.push([w - 1, y]); }

        while(stack.length > 0) {
          const [x, y] = stack.pop();
          if (x < 0 || x >= w || y < 0 || y >= h) continue;
          const p = y * w + x;
          if (visited[p]) continue;
          visited[p] = 1;
          
          const idx = p * 4;
          if (isBg(idx)) {
            data[idx+3] = 0;
            stack.push([x+1, y], [x-1, y], [x, y+1], [x, y-1]);
          }
        }
        ctx.putImageData(imgData, 0, 0);

        setCharSprites(prev => {
          const arr = [...prev];
          arr[index] = canvas.toDataURL("image/png");
          return arr;
        });
      };
      img.src = src;

      historyRef.current.push({

            position: "absolute", top: "45%", left: "50%", transform: "translate(-50%, -50%)",
            fontSize: "8rem", fontWeight: 900, color: "#fff", textShadow: "0 0 40px #00E5FF, 0 0 20px #00E5FF",
            zIndex: 100, pointerEvents: "none", animation: "judgePop 0.8s ease-out forwards"
          }
        }, cdText)
      ),

      // ボタン
      h("div", {style:{display:"flex",gap:6,padding:"10px 8px calc(16px + env(safe-area-inset-bottom))",background:"#0a0018",flexShrink:0}},
        activeLanes.map((l, i) => h("div", {
          key:i, ref: el => laneRefs.current[i] = el,
          onPointerDown: () => { setPressed(p=>({...p,[i]:true})); handleHit(i); },
          onPointerUp:   () => setPressed(p=>({...p,[i]:false})),
          onPointerLeave:() => setPressed(p=>({...p,[i]:false})),
          style:{flex:1,height:"clamp(56px,10vw,96px)",borderRadius:12,background:pressed[i]?`radial-gradient(circle at 50% 30%,#fff8,${l.color})`:`radial-gradient(circle at 50% 30%,${l.color}88,${l.color}33)`,border:`2px solid ${l.color}`,boxShadow:pressed[i]?`0 0 30px ${l.color},0 0 60px ${l.color}66`:`0 0 10px ${l.color}55`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:2,transform:pressed[i]?"scaleY(0.92)":"scaleY(1)",transition:"transform 0.06s,box-shadow 0.06s,background 0.06s",userSelect:"none",WebkitUserSelect:"none",touchAction:"manipulation"}
        },
          h("div", {style:{width:"clamp(22px,4vw,36px)",height:"clamp(22px,4vw,36px)",borderRadius:"50%",background:pressed[i]?"#fff":l.color,boxShadow:`0 0 8px ${l.color}`}}),
          h("div", {style:{fontSize:"clamp(10px,1.8vw,16px)",fontWeight:700,color:pressed[i]?"#fff":l.color,letterSpacing:1}}, l.label)
        ))
      )
    )
  );

  // ================================================================
  // GAME OVER画面
  // ================================================================
  if (gs === "gameover") return h("div", {style:{width:"100%",height:"var(--app-h)",background:"#0a0010",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",overflow:"auto",padding:"20px 0"}},
    charSprites[3] && h("div", {style:{marginBottom:30}},
      h("img", {src:charSprites[3], style:{width:"216px",height:"216px",objectFit:"contain"}})
    ),
    h("div", {style:{textAlign:"center",background:"rgba(10,0,20,0.95)",borderRadius:24,border:"1px solid #FF3FA4",padding:"40px 60px",boxShadow:"0 0 60px #FF3FA444"}},
      h("div", {style:{fontSize:"4rem",fontWeight:900,letterSpacing:4,color:"#FF3FA4",filter:"drop-shadow(0 0 24px #FF3FA4)",marginBottom:12}}, "GAME OVER"),
      h("div", {style:{color:"#8855bb",fontSize:12,marginBottom:8}}, `${mode} | SPEED ×${speed} | Lv.${level}`),
      h("div", {style:{fontSize:"2rem",fontWeight:800,color:"#fff",letterSpacing:2,marginBottom:20}}, score.toLocaleString()),
      h("div", {style:{display:"flex",gap:10,justifyContent:"center"}},
        h("button", {onClick:()=>startGame(mode,level,speed), style:{background:"linear-gradient(135deg,#FF3FA4,#8B00FF)",border:"none",borderRadius:50,padding:"12px 40px",color:"#fff",fontSize:15,fontWeight:800,letterSpacing:3,cursor:"pointer",boxShadow:"0 0 24px #FF3FA4aa"}}, "▶ RETRY"),
        h("button", {onClick:()=>setGs("idle"), style:{background:"transparent",border:"1px solid #330066",borderRadius:50,padding:"12px 28px",color:"#8855bb",fontSize:13,fontWeight:700,cursor:"pointer"}}, "MENU")
      )
    )
  );

  // ================================================================
  // STAGE RESULT画面
  // ================================================================
  if (gs === "stage_result") {
    const curRes = history[history.length - 1] || {};
    return h("div", {style:{width:"100%",height:"var(--app-h)",background:"#0a0010",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",overflow:"auto",backgroundImage:"radial-gradient(ellipse at 50% 0%,#1a0035 0%,#0a0010 70%)"}},
      charSprites[0] && h("div", {style:{marginTop:36,marginBottom:30}},
        h("img", {src:charSprites[0], style:{width:"192px",height:"192px",objectFit:"contain",animation:"charDance 1.5s ease-in-out infinite",transformOrigin:"bottom center"}})
      ),
      h("div", {style:{textAlign:"center",background:"rgba(10,0,20,0.95)",borderRadius:24,border:`1px solid ${jColor(curRes.rank) || "#330066"}`,padding:"40px 60px",boxShadow:`0 0 60px ${jColor(curRes.rank) || "#8A00FF"}44`}},
        h("div", {style:{fontSize:"2.5rem",fontWeight:900,letterSpacing:4,color:"#fff",marginBottom:8}}, `STAGE ${stage} CLEAR!`),
        h("div", {style:{fontSize:"4rem",fontWeight:900,color:jColor(curRes.rank),textShadow:`0 0 20px ${jColor(curRes.rank)}`,marginBottom:20}}, curRes.rank),
        h("div", {style:{fontSize:"2rem",fontWeight:800,color:"#fff",fontFamily:"monospace",letterSpacing:2,marginBottom:20}}, (curRes.score || 0).toLocaleString()),
        
        h("div", {style:{display:"flex",gap:40,justifyContent:"center",marginBottom:30,textAlign:"left"}},
          h("div", null,
            h("div", {style:{color:"#00E5FF",fontSize:14,fontWeight:800}}, `COOL/GREAT: ${curRes.counts?.GREAT || 0}`),
            h("div", {style:{color:"#69FF47",fontSize:14,fontWeight:800}}, `GOOD: ${curRes.counts?.GOOD || 0}`),
            h("div", {style:{color:"#FF3FA4",fontSize:14,fontWeight:800}}, `MISS: ${curRes.counts?.MISS || 0}`)
          ),
          h("div", null,
            h("div", {style:{color:"#FFD600",fontSize:14,fontWeight:800}}, `MAX COMBO: ${curRes.maxCombo || 0}`),
            h("div", {style:{color:"#fff",fontSize:14,fontWeight:800}}, `ACCURACY: ${curRes.accuracy || "0.0"}%`)
          )
        ),

        h("button", {
          onClick: () => {
            if (stage < 3) {
              stageRef.current++; setStage(stageRef.current);
              startHpRef.current = Math.max(10, healthRef.current);
              trackRef.current = DEFAULT_TRACK; setTrack(DEFAULT_TRACK);
              const fileInput = document.getElementById("bgm-file-single");
              if (fileInput) fileInput.value = "";
              setGs("idle"); gsRef.current = "idle";
            } else {
              setGs("final_result"); gsRef.current = "final_result";
            }
          },
          style:{background:"linear-gradient(135deg,#FF3FA4,#8B00FF)",border:"none",borderRadius:50,padding:"14px 40px",color:"#fff",fontSize:16,fontWeight:800,letterSpacing:3,cursor:"pointer",boxShadow:"0 0 30px #FF3FA4aa"}
        }, stage < 3 ? "▶ NEXT STAGE" : "▶ FINAL RESULT")
      )
    );
  }

  // ================================================================
  // FINAL RESULT画面 (全3ステージ終了)
  // ================================================================
  if (gs === "final_result") {
    const totalScoreStr = history.reduce((a,c)=>a+c.score, 0).toLocaleString();
    return h("div", {style:{width:"100%",height:"var(--app-h)",background:"#0a0010",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",overflow:"auto",padding:"40px 0"}},
      h("div", {style:{fontSize:"3.5rem",fontWeight:900,color:"#FFD600",textShadow:"0 0 30px #FFD600aa",letterSpacing:6,marginBottom:40,textAlign:"center"}}, "CONGRATULATION!"),
      h("div", {style:{display:"flex",alignItems:"center",justifyContent:"center",gap:"20px",flexWrap:"wrap",width:"100%"}},
        h("div", {style:{textAlign:"center",background:"rgba(10,0,20,0.92)",borderRadius:24,border:"1px solid #330066",padding:"30px 40px",boxShadow:"0 0 60px #8A00FF44",maxWidth:"90%",width:"400px"}},
          h("div", {style:{fontSize:14,letterSpacing:6,color:"#00E5FF",marginBottom:16,fontWeight:900}}, "FINAL RESULT"),
          h("div", {style:{fontSize:"3rem",fontWeight:900,color:"#fff",letterSpacing:4,marginBottom:20,textShadow:"0 0 20px #fff8"}}, totalScoreStr),
          h("div", {style:{display:"flex",flexDirection:"column",gap:12,textAlign:"left",marginBottom:24,width:"100%"}},
            history.map((r, i) => h("div", {key:i, style:{background:"rgba(255,255,255,0.05)",padding:"10px 16px",borderRadius:12,border:"1px solid #330066",display:"flex",justifyContent:"space-between",alignItems:"center"}},
              h("div", null,
                h("div", {style:{fontSize:12,color:"#00E5FF",fontWeight:800,letterSpacing:1,marginBottom:4}}, "STAGE " + r.stage),
                h("div", {style:{fontSize:10,color:"#8855bb"}}, `Acc: ${r.accuracy}% / MaxC: ${r.maxCombo}`)
              ),
              h("div", {style:{textAlign:"right"}},
                h("div", {style:{fontSize:16,fontWeight:800,color:"#fff"}}, r.score.toLocaleString()),
                h("div", {style:{fontSize:12,fontWeight:900,color:jColor(r.rank)}}, r.rank)
              )
            ))
          ),
          h("button", {onClick: returnToMenu, style:{background:"linear-gradient(135deg,#FF3FA4,#8B00FF)",border:"none",borderRadius:50,padding:"14px 44px",color:"#fff",fontSize:16,fontWeight:800,letterSpacing:3,cursor:"pointer",boxShadow:"0 0 24px #FF3FA4aa"}}, "▶ 最初から遊ぶ")
        ),
        h("img", {
          src: "images/final_char_bg.png", 
          alt: "画像がありません。", 
          style: {width:180, height:180, objectFit:"contain", animation:"charDance 0.8s infinite ease-in-out"}
        })
      )
    );
  }
  return null; // Fallback
}

ReactDOM.createRoot(document.getElementById("root")).render(h(PopnGame));
</script>
</body>
</html>
