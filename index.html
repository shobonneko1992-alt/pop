function buildChart(mode, level, targetBeats) {
  const baseBeatsLen = 20; // 1ループの基本拍数
  const fallbackTarget = 100; // 未指定時のデフォルト（100拍）
  const target = targetBeats || fallbackTarget;
  const numLanes = mode === "3K" ? 3 : 5;
  const charts = mode === "3K" ? CHARTS_3K : CHARTS_5K;
  const base = charts[level] ?? charts[1];
  const chart = [];
  let currentRep = 0;
  let prevLane = -1;
  
  while (currentRep * baseBeatsLen < target) {
    const shiftAmt = Math.floor(Math.random() * numLanes);

    base.forEach(([beat, originalLane]) => {
      const actualBeat = beat + currentRep * baseBeatsLen;
      if (actualBeat <= target) {
        let actualLane = originalLane;
        
        // 最初のループ以降はレーン配置にランダム性を持たせる
        if (currentRep > 0) {
          const rand = Math.random();
          if (rand < 0.25 && prevLane !== -1) {
            // 25%の確率で前のノーツと同じレーン（同じ色の連続）
            actualLane = prevLane;
          } else if (rand < 0.6) {
            // 35%の確率で完全ランダム
            actualLane = Math.floor(Math.random() * numLanes);
          } else {
            // 40%の確率でパターンをベースに全体をシフトさせたもの
            actualLane = (originalLane + shiftAmt) % numLanes;
          }
        }
        
        chart.push({beat: actualBeat, lane: actualLane, id:`${currentRep}-${beat}-${Math.random()}`});
        prevLane = actualLane;
      }
    });
    currentRep++;
  }
  return chart.sort((a, b) => a.beat - b.beat);
}

async function analyzeBPM(urlOrFile) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    let arrayBuffer;
    if (typeof urlOrFile === "string") {
      const response = await fetch(urlOrFile);
      arrayBuffer = await response.arrayBuffer();
    } else if (urlOrFile instanceof File || urlOrFile instanceof Blob) {
      arrayBuffer = await urlOrFile.arrayBuffer();
    } else {
      return 130;
    }
    const audioBuffer = await ctx.decodeAudioData(arrayBuffer);
    const sampleRate = audioBuffer.sampleRate;
    const data = audioBuffer.getChannelData(0);
    
    // 最初の40秒に限定して解析速度とBPM判定の精度を向上
    const maxSamples = Math.min(data.length, sampleRate * 40);
    const step = 4;
    
    // 音量に応じた動的なしきい値設定 (全体の最大音量の70%)
    let maxVal = 0;
    for (let i = 0; i < maxSamples; i += 100) {
      if (Math.abs(data[i]) > maxVal) maxVal = Math.abs(data[i]);
    }
    let threshold = maxVal * 0.7;
    if (threshold < 0.15) threshold = 0.2; // 極端に静かな曲対策
    
    let peaks = [];
    for (let i = 0; i < maxSamples; i += step) {
      if (Math.abs(data[i]) > threshold) {
        peaks.push(i);
        // 音ゲーに多いアップテンポ（BPM 240相当）を考慮して最小間隔を0.25秒に制限
        i += sampleRate * 0.25; 
      }
    }
    
    // ピークが少なすぎる場合は閾値を下げて再試行
    if (peaks.length < 12) {
      threshold = maxVal * 0.45;
      peaks = [];
      for (let i = 0; i < maxSamples; i += step) {
        if (Math.abs(data[i]) > threshold) {
          peaks.push(i);
          i += sampleRate * 0.25;
        }
      }
    }
    
    if (peaks.length < 2) return 130;
    
    // ピーク間の間隔を集計
    let intervals = [];
    for (let i = 1; i < peaks.length; i++) {
      intervals.push(peaks[i] - peaks[i - 1]);
    }
    
    // 各間隔をBPMに変換し、テンポの最頻値を算出する
    const bpms = intervals.map(interval => {
      const duration = interval / sampleRate;
      let b = 60 / duration;
      if (b <= 0) return 0;
      // 95 〜 190 の基本テンポ範囲に一旦マッピング
      while (b < 95) b *= 2;
      while (b > 190) b /= 2;
      return Math.round(b);
    }).filter(b => b > 0);
    
    if (bpms.length === 0) return 130;
    
    // 最頻値 (Mode) の集計
    const counts = {};
    let maxCount = 0;
    let modeBpm = 130;
    bpms.forEach(b => {
      const rounded = Math.round(b);
      counts[rounded] = (counts[rounded] || 0) + 1;
      if (counts[rounded] > maxCount) {
        maxCount = counts[rounded];
        modeBpm = rounded;
      }
    });
    
    // アップテンポな曲 (最大240) までを適正カバー
    let finalBpm = modeBpm;
    if (finalBpm < 90) finalBpm *= 2;
    if (finalBpm > 240) finalBpm /= 2;
    
    return Math.round(finalBpm);
  } catch (e) {
    console.error("BPM analysis failed:", e);
    return 130;
  }
}

let globalAudioCtx = null;
function playBeep(freq) {
  try {
    if (!globalAudioCtx) {
      globalAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (globalAudioCtx.state === "suspended") {
      globalAudioCtx.resume();
    }
    const ctx = globalAudioCtx;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = "sine";
    o.frequency.setValueAtTime(freq || 440, ctx.currentTime);
    g.gain.setValueAtTime(0.08, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
    o.start();
    o.stop(ctx.currentTime + 0.08);
  } catch (e) {
    console.error("playBeep error:", e);
  }
}

// ================================================================
// DB Utility (IndexedDB for storing custom audio files)
// ================================================================
const DB_NAME = "PopnDB";
const STORE_NAME = "audioFiles";

function initDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => { e.target.result.createObjectStore(STORE_NAME); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function saveAudioFile(name, arrayBuffer) {
  return initDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readwrite");
    tx.objectStore(STORE_NAME).put(arrayBuffer, name);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  }));
}

function getAudioFile(name) {
  return initDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readonly");
    const req = tx.objectStore(STORE_NAME).get(name);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(tx.error);
  }));
}

function getAudioFileList() {
  return initDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readonly");
    const req = tx.objectStore(STORE_NAME).getAllKeys();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(tx.error);
  }));
}

const getAudioSrc = async (fileName) => {
  if (!fileName) return { url: "", isBlob: false };
  try {
    const buf = await getAudioFile(fileName);
    if (buf) {
      return { url: URL.createObjectURL(new Blob([buf])), isBlob: true };
    }
  } catch(e) {}
  return { url: "フリーBGM/" + fileName, isBlob: false };
};

// ================================================================
// スコアのルーレット演出コンポーネント
// 画面表示直後はランダムな数字が高速で切り替わり、
// duration経過後（終盤はイージングで収束）に本当のスコアで確定する
// ================================================================
function AnimatedScore({ value, duration = 3000 }) {
  const [display, setDisplay] = useState(0);
  useEffect(() => {
    const target = Math.max(0, Math.round(value) || 0);
    const digits = Math.max(String(target).length, 5);
    const randMax = Math.pow(10, digits) - 1;
    const startTime = performance.now();
    const tid = setInterval(() => {
      const elapsed = performance.now() - startTime;
      const progress = Math.min(1, elapsed / duration);
      if (progress >= 1) {
        setDisplay(target);
        clearInterval(tid);
        return;
      }
      if (progress < 0.6) {
        // 前半：完全ランダムな数字がくるくる回る
        setDisplay(Math.floor(Math.random() * (randMax + 1)));
      } else {
        // 後半：本当の点数に向かって徐々に収束（イージング）
        const t = (progress - 0.6) / 0.4;
        const settled = Math.round(target * t);
        const noise = Math.round(randMax * (1 - t) * 0.25);
        const jitter = noise > 0 ? (Math.floor(Math.random() * (noise * 2 + 1)) - noise) : 0;
        setDisplay(Math.max(0, settled + jitter));
      }
    }, 45);
    return () => clearInterval(tid);
  }, [value, duration]);
  return h("span", null, display.toLocaleString());
}

  useEffect(() => {
    if (typeof CHAR_B64 === "undefined") {
      console.error("char.js is not loaded");
      return;
    }
    const loadAndProcess = (src, index) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        const w = img.width;
        const h = img.height;
        canvas.width = w; canvas.height = h;
        ctx.drawImage(img, 0, 0);
        
        const imgData = ctx.getImageData(0, 0, w, h);
        const data = imgData.data;

        const isBg = (idx) => {
          const r = data[idx], g = data[idx+1], b = data[idx+2];
          const max = Math.max(r, g, b), min = Math.min(r, g, b);
          return (r > 245 && g > 245 && b > 245) || (r > 210 && g > 210 && b > 210 && (max - min) < 20);
        };

        const stack = [];
        const visited = new Uint8Array(w * h);
        for (let x = 0; x < w; x++) { stack.push([x, 0]); stack.push([x, h - 1]); }
        for (let y = 0; y < h; y++) { stack.push([0, y]); stack.push([w - 1, y]); }

        while(stack.length > 0) {
          const [x, y] = stack.pop();
          if (x < 0 || x >= w || y < 0 || y >= h) continue;
          const p = y * w + x;
          if (visited[p]) continue;
          visited[p] = 1;
          
          const idx = p * 4;
          if (isBg(idx)) {
            data[idx+3] = 0;
            stack.push([x+1, y], [x-1, y], [x, y+1], [x, y-1]);
          }
        }
        ctx.putImageData(imgData, 0, 0);

        setCharSprites(prev => {
          const arr = [...prev];
          arr[index] = canvas.toDataURL("image/png");
          return arr;
        });
      };
      img.src = src;
    };
    
    loadAndProcess(CHAR_B64, 0);
    loadAndProcess(CHER_B64, 1);
    loadAndProcess(CHER2_B64, 2);

  // ── BGM停止 ───────────────────────────────────────────────────────
  const stopBGM = useCallback(() => {
    if (bgmRef.current) { bgmRef.current.stop(); bgmRef.current = null; }
  }, []);

  // ── ゲームループ ───────────────────────────────────────────────────
  const gameLoop = useCallback(() => {
    if (gsRef.current !== "playing") return;
    const elapsed  = performance.now() - startRef.current;
    const travelMs = BASE_TRAVEL_MS / speedRef.current;

    while (chartIdxRef.current < chartRef.current.length) {
      const {beat, lane, id} = chartRef.current[chartIdxRef.current];
      if (beat * beatMsRef.current - elapsed <= travelMs) {
        activeRef.current.push({id, lane, hitTime: beat * beatMsRef.current, missed: false});
        chartIdxRef.current++;
      } else break;
    }

    activeRef.current = activeRef.current.map(n => {
      const y = (elapsed - (n.hitTime - travelMs)) / travelMs * HIT_ZONE_Y;
      if (!n.missed && n.y !== undefined && n.y > 94) {
        n.missed = true; comboRef.current = 0; setCombo(0);
        countsRef.current.MISS++; setCounts({...countsRef.current});
        setJudg({label:"MISS", id: noteIdRef.current++, lane: n.lane});
        healthRef.current = Math.max(0, healthRef.current - 15); setHealth(healthRef.current);
        
        setIsMissChar(true);
        if (missCharTidRef.current) clearTimeout(missCharTidRef.current);
        missCharTidRef.current = setTimeout(() => setIsMissChar(false), 1000);

        if (healthRef.current <= 0) { stopBGM(); setResultRevealed(false); setGs("gameover"); gsRef.current = "gameover"; }
      }
      return {...n, y};
    });

    activeRef.current = activeRef.current.filter(n => n.y < 120);
    setNotes([...activeRef.current]);
    setTimer(elapsed / 1000);

    if (gsRef.current === "playing" && chartIdxRef.current >= chartRef.current.length && activeRef.current.length === 0) {
      stopBGM();
      const tNotes = chartRef.current.length || 1;
      const acc = ((countsRef.current.GREAT * 100 + countsRef.current.GOOD * 70) / (tNotes * 100) * 100).toFixed(1);
      const ag = countsRef.current.GOOD === 0 && countsRef.current.MISS === 0 && countsRef.current.GREAT > 0;
      const rk = ag ? "S" : acc >= 85 ? "A" : acc >= 70 ? "B" : acc >= 50 ? "C" : "D";
      historyRef.current.push({
        stage: stageRef.current, score: scoreRef.current, counts: {...countsRef.current}, maxCombo: maxComboRef.current, accuracy: acc, rank: rk
      });

      if (customSong && customSong.chart) {
        chartRef.current = customSong.chart.filter(n => n.beat * beatMsRef.current >= travelMs);
      } else {

          n => n.beat * beatMsRef.current >= 2000 + travelMs
        );

      chartIdxRef.current = 0; activeRef.current = [];
      scoreRef.current = 0; comboRef.current = 0; maxComboRef.current = 0; healthRef.current = startHpRef.current;

      setCounts({GREAT:0,GOOD:0,MISS:0}); setNotes([]); setJudg(null); setPressed({}); setLf({});

  const spawnBurst = useCallback((li) => {

    if (candidates.length) {
      // 通常ヒット
      const best  = candidates[0];

      const label = isGreat ? "GREAT" : "GOOD";
      const displayLabel = (isGreat && healthRef.current === 100) ? "COOL" : label;
      
      activeRef.current = activeRef.current.filter(n => n.id !== best.id);

      countsRef.current[label]++;

      scoreRef.current    = Math.round(100000 * (countsRef.current.GREAT + countsRef.current.GOOD * 0.7) / total);
      healthRef.current   = Math.min(100, healthRef.current + (label === "GREAT" ? 2.5 : 1.0));

      setCounts({...countsRef.current}); setHealth(healthRef.current);
      setJudg({label: displayLabel, id: noteIdRef.current++, lane: li});
      spawnLaneFlash(li, displayLabel);
      spawnBurst(li);
      playBeep([523,587,659,784,880][li] ?? 440);
      return;
    }

    // 早押しMISS：ライン手前に向かってくるノートがあればMISS（ノートは消さず残す）
    const approaching = activeRef.current.find(n => n.lane === li && !n.missed && n.y !== undefined && n.y >= 0 && n.y < 82);

        // Reactの外側でDOM要素を直接出し入れするための専用レイヤー。

          h("div", {style:{position:"absolute",top:0,left:0,width:"100%",height:"100%",background:"rgba(10,0,20,0.45)",animation:"resultFadeIn 0.3s ease both"}}),
          h("div", {style:{position:"relative",fontSize:"clamp(1.6rem,9vw,3.2rem)",fontWeight:900,letterSpacing:3,background:"linear-gradient(180deg,#fff8d8,#FFD600 45%,#FF8C00 55%,#fff8d8)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",filter:"drop-shadow(0 0 12px #FFD600cc) drop-shadow(0 3px 2px #4a2a00)",animation:"finishPop 0.9s cubic-bezier(.34,1.56,.64,1) both"}}, "FINISH!")

        ...notes.map(note => {

          const laneW = 100 / activeLanes.length;
          const noteW = (100 / 5) * 0.88;

  // ================================================================

        h("div", {style:{flex:1,position:"relative",margin:"0 6px 6px",borderRadius:12,overflow:"hidden",background:"linear-gradient(180deg,#0d0020 0%,#150030 100%)",border:"1px solid #220044"}},

  // ================================================================

  if (gs === "vs_result") {

    const draw  = vsScoreP1Ref.current === vsScoreP2Ref.current;
    return h("div", {style:{width:"100%",height:"var(--app-h)",background:"#0a0010",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",overflow:"auto",padding:"20px 0",backgroundImage:"radial-gradient(ellipse at 50% 0%,#1a0035 0%,#0a0010 70%)"}},
      h("div", {style:{fontSize:"clamp(1.8rem,8vw,3rem)",fontWeight:900,letterSpacing:4,color:"#FFD600",filter:"drop-shadow(0 0 20px #FFD600aa)",marginBottom:24,textAlign:"center",opacity:vsResultRevealed?1:0,animation:vsResultRevealed?"resultFadeIn 0.6s ease":"none"}},
        draw ? "DRAW!" : (p1Win ? "1P WIN!" : "2P WIN!")

            h("div", {style:{fontSize:"clamp(1.2rem,5vw,1.7rem)",fontWeight:900,color:"#fff",fontFamily:"monospace",marginBottom:10}}, h(AnimatedScore, {value: sc})),
            h("div", {style:{fontSize:10,color:"#00E5FF"}}, "GREAT "+mc.GREAT),

    resultRevealed && charSprites[3] && h("div", {style:{marginBottom:30,animation:"resultFadeIn 0.6s ease"}},
      h("img", {src:charSprites[3], style:{width:"216px",height:"216px",objectFit:"contain"}})
    ),
    h("div", {style:{textAlign:"center",background:"rgba(10,0,20,0.95)",borderRadius:24,border:"1px solid #FF3FA4",padding:"40px 60px",boxShadow:"0 0 60px #FF3FA444"}},
      resultRevealed && h("div", {style:{fontSize:"4rem",fontWeight:900,letterSpacing:4,color:"#FF3FA4",filter:"drop-shadow(0 0 24px #FF3FA4)",marginBottom:12,animation:"resultFadeIn 0.6s ease"}}, "GAME OVER"),
      h("div", {style:{color:"#8855bb",fontSize:12,marginBottom:8}}, `${mode} | SPEED ×${speed} | Lv.${level}`),
      h("div", {style:{fontSize:"2rem",fontWeight:800,color:"#fff",letterSpacing:2,marginBottom:20}}, h(AnimatedScore, {value: score})),
      h("div", {style:{display:"flex",gap:10,justifyContent:"center"}},
        h("button", {onClick:()=>startGame(mode,level,speed), style:{background:"linear-gradient(135deg,#FF3FA4,#8B00FF)",border:"none",borderRadius:50,padding:"12px 40px",color:"#fff",fontSize:15,fontWeight:800,letterSpacing:3,cursor:"pointer",boxShadow:"0 0 24px #FF3FA4aa"}}, "▶ RETRY"),
        h("button", {onClick:()=>setGs("idle"), style:{background:"transparent",border:"1px solid #330066",borderRadius:50,padding:"12px 28px",color:"#8855bb",fontSize:13,fontWeight:700,cursor:"pointer"}}, "MENU")
      )
    )
  );

  // ================================================================
  // STAGE RESULT画面
  // ================================================================
  if (gs === "stage_result") {
    const curRes = history[history.length - 1] || {};
    return h("div", {style:{width:"100%",height:"var(--app-h)",background:"#0a0010",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",overflow:"auto",backgroundImage:"radial-gradient(ellipse at 50% 0%,#1a0035 0%,#0a0010 70%)",padding:"10px 0"}},
      resultRevealed && charSprites[0] && h("div", {style:{marginTop:8,marginBottom:10,animation:"resultFadeIn 0.6s ease"}},
        h("img", {src:charSprites[0], style:{width:"144px",height:"144px",objectFit:"contain",animation:"charDance 1.5s ease-in-out infinite",transformOrigin:"bottom center"}})
      ),
      h("div", {style:{textAlign:"center",background:"rgba(10,0,20,0.95)",borderRadius:24,border:`1px solid ${jColor(curRes.rank) || "#330066"}`,padding:"clamp(16px,4vw,28px) clamp(20px,6vw,40px)",boxShadow:`0 0 60px ${jColor(curRes.rank) || "#8A00FF"}44`,maxWidth:"92%"}},
        resultRevealed && h("div", {style:{fontSize:"clamp(1.5rem,6vw,2.2rem)",fontWeight:900,letterSpacing:3,color:"#fff",marginBottom:4,animation:"resultFadeIn 0.6s ease"}}, `STAGE ${stage} CLEAR!`),
        resultRevealed && h("div", {style:{fontSize:"clamp(2.4rem,9vw,3.5rem)",fontWeight:900,color:jColor(curRes.rank),textShadow:`0 0 20px ${jColor(curRes.rank)}`,marginBottom:8,animation:"resultFadeIn 0.6s ease"}}, curRes.rank),
        h("div", {style:{fontSize:"clamp(1.4rem,6vw,1.8rem)",fontWeight:800,color:"#fff",fontFamily:"monospace",letterSpacing:2,marginBottom:12}}, h(AnimatedScore, {value: curRes.score || 0})),
        
        h("div", {style:{display:"flex",gap:30,justifyContent:"center",marginBottom:16,textAlign:"left"}},
          h("div", null,
            h("div", {style:{color:"#00E5FF",fontSize:12,fontWeight:800}}, `COOL/GREAT: ${curRes.counts?.GREAT || 0}`),
            h("div", {style:{color:"#69FF47",fontSize:12,fontWeight:800}}, `GOOD: ${curRes.counts?.GOOD || 0}`),
            h("div", {style:{color:"#FF3FA4",fontSize:12,fontWeight:800}}, `MISS: ${curRes.counts?.MISS || 0}`)
          ),
          h("div", null,
            h("div", {style:{color:"#FFD600",fontSize:12,fontWeight:800}}, `MAX COMBO: ${curRes.maxCombo || 0}`),
            h("div", {style:{color:"#fff",fontSize:12,fontWeight:800}}, `ACCURACY: ${curRes.accuracy || "0.0"}%`)
          )
        ),

        h("button", {
          onClick: () => {
            if (stage < 3) {
              stageRef.current++; setStage(stageRef.current);
              startHpRef.current = Math.max(10, healthRef.current);
              trackRef.current = DEFAULT_TRACK; setTrack(DEFAULT_TRACK);
              const fileInput = document.getElementById("bgm-file-single");
              if (fileInput) fileInput.value = "";
              setGs("idle"); gsRef.current = "idle";
            } else {
              setResultRevealed(false); setGs("final_result"); gsRef.current = "final_result";
            }
          },
          style:{background:"linear-gradient(135deg,#FF3FA4,#8B00FF)",border:"none",borderRadius:50,padding:"12px 34px",color:"#fff",fontSize:15,fontWeight:800,letterSpacing:2,cursor:"pointer",boxShadow:"0 0 30px #FF3FA4aa"}
        }, stage < 3 ? "▶ NEXT STAGE" : "▶ FINAL RESULT")
      )
    );
  }

  // ================================================================
  // FINAL RESULT画面 (全3ステージ終了)
  // ================================================================
  if (gs === "final_result") {
    const totalScore = history.reduce((a,c)=>a+c.score, 0);
    return h("div", {style:{width:"100%",height:"var(--app-h)",background:"#0a0010",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-start",overflow:"auto",padding:"36px 0 20px"}},
      resultRevealed && h("div", {style:{fontSize:"clamp(1.44rem,6.6vw,2.52rem)",fontWeight:900,color:"#FFD600",textShadow:"0 0 20px #FFD600aa",letterSpacing:3,marginBottom:2,textAlign:"center",padding:"0 5vw",animation:"resultFadeIn 0.6s ease"}}, "CONGRATULATION!"),
      resultRevealed && h("img", {
        src: "images/final_char_bg.png", 
        alt: "画像がありません。", 
        style: {width:"clamp(84px,24vw,132px)", height:"clamp(84px,24vw,132px)", objectFit:"contain", animation:"charDance 0.8s infinite ease-in-out"}
      }),
      h("div", {style:{textAlign:"center",background:"rgba(10,0,20,0.92)",borderRadius:20,border:"1px solid #330066",padding:"14px 24px",boxShadow:"0 0 40px #8A00FF44",maxWidth:"92%",width:"400px"}},
        h("div", {style:{fontSize:11,letterSpacing:5,color:"#00E5FF",marginBottom:6,fontWeight:900}}, "FINAL RESULT"),
        h("div", {style:{fontSize:"clamp(1.4rem,6vw,2.2rem)",fontWeight:900,color:"#fff",letterSpacing:3,marginBottom:10,textShadow:"0 0 16px #fff8"}}, h(AnimatedScore, {value: totalScore})),
        h("div", {style:{display:"flex",flexDirection:"column",gap:6,textAlign:"left",marginBottom:12,width:"100%"}},
          history.map((r, i) => h("div", {key:i, style:{background:"rgba(255,255,255,0.05)",padding:"6px 12px",borderRadius:10,border:"1px solid #330066",display:"flex",justifyContent:"space-between",alignItems:"center"}},
            h("div", null,
              h("div", {style:{fontSize:11,color:"#00E5FF",fontWeight:800,letterSpacing:1,marginBottom:2}}, "STAGE " + r.stage),
              h("div", {style:{fontSize:9,color:"#8855bb"}}, `Acc: ${r.accuracy}% / MaxC: ${r.maxCombo}`)
            ),
            h("div", {style:{textAlign:"right"}},
              h("div", {style:{fontSize:14,fontWeight:800,color:"#fff"}}, r.score.toLocaleString()),
              h("div", {style:{fontSize:11,fontWeight:900,color:jColor(r.rank)}}, r.rank)
            )
          ))
        ),
        h("button", {onClick: returnToMenu, style:{background:"linear-gradient(135deg,#FF3FA4,#8B00FF)",border:"none",borderRadius:50,padding:"10px 34px",color:"#fff",fontSize:14,fontWeight:800,letterSpacing:2,cursor:"pointer",boxShadow:"0 0 20px #FF3FA4aa"}}, "▶ 最初から遊ぶ")
      )
    );
  }
  return null; // Fallback
}

ReactDOM.createRoot(document.getElementById("root")).render(h(PopnGame));
</script>
</body>
</html>
